<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人員雲端管理系統 (自定義姓名版)</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        /* --- 基礎設定 --- */
        :root { --primary: #3498db; --secondary: #2c3e50; --accent: #f1c40f; --danger: #e74c3c; --success: #27ae60; }
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background-color: #f4f7f6; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* --- 載入動畫 --- */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; transition: opacity 0.5s; pointer-events: none; opacity: 1; }
        #loading-screen.hidden { opacity: 0; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- 側邊欄 --- */
        .sidebar { width: 320px; background: var(--secondary); color: white; display: flex; flex-direction: column; padding: 15px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 100; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); white-space: nowrap; overflow: hidden; }
        .sidebar.collapsed { width: 0; padding: 15px 0; opacity: 0; margin-left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #5d6d7e; padding-bottom: 10px; margin-bottom: 10px; }
        .sidebar h3 { margin: 0; font-size: 1.2rem; }
        .search-box { margin-bottom: 10px; }
        .search-box input { width: 100%; padding: 8px; border-radius: 4px; border: none; background: #34495e; color: white; }
        
        /* 視圖切換按鈕區 */
        .view-toggle { display: flex; gap: 8px; margin-bottom: 10px; }
        .view-toggle button { flex: 1; padding: 8px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s; }
        #btn-view-active { background: var(--primary); color: white; }
        #btn-view-archived { background: #7f8c8d; color: white; }

        .batch-control { display: flex; justify-content: space-between; padding: 8px; margin-bottom: 10px; font-size: 13px; background: rgba(0,0,0,0.2); border-radius: 4px; }
        .batch-control span { cursor: pointer; color: var(--primary); transition: 0.2s; }
        .batch-control span:hover { color: #5dade2; text-decoration: underline; }
        
        /* 加上 -webkit-overflow-scrolling 讓 iOS 滑動更順暢 */
        .member-list { flex: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; border: 1px solid #34495e; margin-bottom: 10px; border-radius: 4px; -webkit-overflow-scrolling: touch; }
        
        .member-list::-webkit-scrollbar { width: 6px; }
        .member-list::-webkit-scrollbar-thumb { background: #5d6d7e; border-radius: 3px; }
        .member-item { padding: 10px; border-bottom: 1px solid #34495e; transition: 0.2s; display: flex; align-items: center; gap: 10px; cursor: grab; background: var(--secondary); }
        .member-item:hover { background: #34495e; }
        .member-item.active { background: #2980b9; border-left: 5px solid var(--accent); }
        .sortable-ghost { opacity: 0.4; border: 2px dashed var(--primary); background: #1a252f; }
        .select-chk { transform: scale(1.3); cursor: pointer; accent-color: var(--primary); }
        .member-name { flex: 1; cursor: pointer; user-select: none; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-status { color: white; border: none; border-radius: 3px; padding: 4px 8px; cursor: pointer; font-size: 12px; }
        .btn-status.archive { background: var(--danger); }
        .btn-status.archive:hover { background: #c0392b; }
        .btn-status.restore { background: var(--success); }
        .btn-status.restore:hover { background: #1e8449; }
        
        .sidebar-btns { display: flex; flex-direction: column; gap: 8px; }
        .btn-add { background: var(--success); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-batch { background: #f39c12; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-settings { background: #7f8c8d; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; font-size: 0.9rem; }

        /* --- 主內容區 --- */
        .main-content { flex: 1; overflow-y: auto; padding: 20px; position: relative; transition: all 0.3s ease; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-top: 40px; }
        #toggle-btn { position: absolute; top: 15px; left: 15px; z-index: 200; background: var(--secondary); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 1.2rem; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        h2 { color: var(--secondary); border-left: 6px solid var(--primary); padding-left: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .input-group { margin-bottom: 15px; }
        .input-group label { font-weight: bold; display: block; margin-bottom: 6px; color: var(--secondary); font-size: 14px; }
        textarea, input[type="text"], select { width: 100%; padding: 10px; border: 1px solid #dcdde1; border-radius: 6px; box-sizing: border-box; font-family: inherit; font-size: 14px; transition: 0.3s; background: white; }
        .btn-group { display: flex; gap: 10px; margin-top: 25px; flex-wrap: wrap; }
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; font-size: 15px; min-width: 150px; }
        .btn-save { background: var(--primary); color: white; }
        .btn-generate { background: #8e44ad; color: white; }
        .output-box { margin-top: 25px; background-color: #f8f9fa; border: 2px solid #e9ecef; border-radius: 8px; padding: 15px; }
        #output-area { width: 100%; background: #fff; border: 1px solid #eee; padding: 10px; min-height: 200px; white-space: pre-wrap; font-family: 'Consolas', monospace; font-size: 13px; line-height: 1.5; color: #333; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal.show { display: flex; }
        .modal-content { background: white; width: 90%; max-width: 600px; padding: 25px; border-radius: 8px; max-height: 90vh; overflow-y: auto; }
        #toast { visibility: hidden; min-width: 200px; background-color: #2d3436; color: #fff; text-align: center; border-radius: 50px; padding: 12px 20px; position: fixed; z-index: 2000; left: 50%; transform: translateX(-50%); bottom: 30px; opacity: 0; transition: 0.3s; }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }

        /* 手機版緊湊顯示設定 */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -320px; height: 100%; width: 280px; }
            .sidebar.mobile-open { left: 0; }
            .main-content { padding: 15px; padding-top: 50px; }
            .container { padding: 15px; margin-top: 10px; }
            
            /* 針對手機版縮小各項間距，讓畫面顯示更多人員 */
            .member-item { padding: 6px 8px; } 
            .member-name { font-size: 14px; }  
            .select-chk { transform: scale(1.1); } 
            .btn-status { padding: 3px 6px; font-size: 11px; } 
            .sidebar-header { margin-bottom: 5px; padding-bottom: 5px; } 
            .view-toggle button { padding: 6px; } 
            .sidebar-btns { gap: 4px; } 
            .sidebar-btns .btn { padding: 8px; font-size: 13px; }
        }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="spinner"></div>
    <div>讀取雲端資料中...</div>
</div>

<div id="toast">✅ 操作成功</div>

<button id="toggle-btn" onclick="toggleSidebar()">☰ 選單</button>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3>📋 雲端管理名單</h3>
        <span onclick="toggleSidebar()" style="cursor:pointer; font-size:1.2rem; display:none;" class="mobile-close">✖</span>
    </div>
    
    <div class="view-toggle">
        <button id="btn-view-active" onclick="switchView('active')">🟢 在職名單</button>
        <button id="btn-view-archived" onclick="switchView('archived')">🗄️ 離職名單</button>
    </div>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="🔍 搜尋名字..." oninput="filterList()">
    </div>

    <div class="batch-control">
        <span onclick="toggleAll(true)">✅ 全選</span>
        <span onclick="toggleAll(false)">❌ 取消</span>
    </div>
    
    <ul id="member-list" class="member-list"></ul>
    
    <div class="sidebar-btns">
        <button onclick="copySelectedMembers()" class="btn btn-batch">📋 複製選取名單(詳細版)</button>
        <button onclick="copyShortSchedule()" class="btn btn-batch" style="background:#e67e22;">📋 複製班表(精簡版)</button>
        <button onclick="createNewMember()" class="btn btn-add">+ 新增下一位資訊</button>
        <button onclick="openSettings()" class="btn btn-settings">⚙️ 設定文案模板</button>
    </div>
</div>

<div class="main-content" id="main-content" onclick="closeSidebarOnMobile()">
    <div class="container">
        <h2 id="editor-title">
            新增人員資訊 
            <span id="save-status" style="font-size:14px; color:#aaa; font-weight:normal; margin-left:10px;"></span>
        </h2>
        
        <div class="input-group">
            <label>👤 姓名 (輸入什麼顯示什麼)</label>
            <input type="text" id="input-name" placeholder="範例：楠楠 或 【🇹🇭】楠楠">
        </div>

        <div class="input-group">
            <label>📍 服務地點</label>
            <select id="input-location">
                <option value="民權路">民權路</option>
                <option value="莊二街">莊二街</option>
                <option value="北新街">北新街</option>
            </select>
        </div>

        <div class="input-group">
            <label>✨ 文案特點</label>
            <textarea id="input-features" rows="2" placeholder="請輸入文案特點..."></textarea>
        </div>

        <div class="input-group">
            <label>💖 身體密碼與時段</label>
            <textarea id="input-body" rows="4"></textarea>
        </div>

        <div class="input-group">
            <label>👑 核心服務</label>
            <textarea id="input-core-services" rows="2"></textarea>
        </div>

        <div class="input-group">
            <label>🎁 福利/活動</label>
            <textarea id="input-gift" rows="2" placeholder="輸入福利或優惠內容..."></textarea>
        </div>

        <div class="input-group">
            <label>💰 方案選擇</label>
            <textarea id="input-packages" rows="5"></textarea>
        </div>

        <div class="input-group">
            <label>✅ 加值服務</label>
            <textarea id="input-extra-services" rows="5"></textarea>
        </div>
        
        <div class="btn-group">
            <button onclick="saveData(false)" class="btn btn-save">💾 手動儲存</button>
            <button onclick="generateOutput(true)" class="btn btn-generate">⚡ 預覽並複製單人</button>
        </div>

        <div class="output-box">
            <h3 style="margin-top:0; color:#3498db; display:flex; justify-content:space-between;">
                📝 排版結果區 
                <small style="color:gray; font-size:12px; font-weight:normal; cursor:pointer;" onclick="copyOutput()">[點此複製]</small>
            </h3>
            <textarea id="output-area" readonly onclick="this.select()"></textarea>
        </div>
    </div>
</div>

<div id="settings-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header" style="display:flex; justify-content:space-between; padding-bottom:10px; border-bottom:1px solid #eee; margin-bottom:15px;">
            <h3>⚙️ 編輯文案模板</h3>
            <span class="close-modal" onclick="closeSettings()" style="cursor:pointer; font-size:24px;">×</span>
        </div>
        <div class="input-group">
            <label>⚠️ 頁尾警語</label>
            <textarea id="setting-footer" rows="8"></textarea>
        </div>
        <div style="text-align: right;">
            <button onclick="saveSettings()" class="btn btn-save" style="width: auto; padding: 10px 20px;">儲存設定</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDsUsWuynci0DP71veuu19Ht8bJmhHSkHs",
        authDomain: "worktools-f53e5.firebaseapp.com",
        databaseURL: "https://worktools-f53e5-default-rtdb.firebaseio.com",
        projectId: "worktools-f53e5",
        storageBucket: "worktools-f53e5.firebasestorage.app",
        messagingSenderId: "950551082090",
        appId: "1:950551082090:web:3c2c4962b5ffa044aec613",
        measurementId: "G-EKPY3SC0BR"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const rosterRef = ref(db, 'roster');

    let currentId = null; 
    let allMembers = {}; 
    let sortedCache = []; 
    let selectedIds = new Set(); 
    let isMobileOpen = false;
    let autoSaveTimer = null;
    let currentView = 'active'; 

    const DEFAULT_BODY = "身體密碼:\n溝通語言:英文\n上班時段【13.00-02.00】";
    const DEFAULT_PACKAGES = "方案選擇:\n🔅40💲2300_1s\n🔅60💲2700_1s\n🔅60💲3300_2s\n🔅120💲4800-3s";
    const DEFAULT_EXTRA = "加值服務項目A\n\n長鍾\n3+1\n5+3";
    const DEFAULT_FOOTER_TEMPLATE = `***請顧客帶  整數進去 小姐小鈔不夠多***\n\n入珠客不告知洗澡\n遭小姐打槍 不退費 \n\n偷拍需刪除影or照片 \n罰 ( 紅包3,000 ) \n偷拔套 ( 紅包6,000 )\n\n洗澡後不退錢\n超過10分鐘禁止更換方案\n脫衣服打槍500 / 摸到身體+500 (脫衣服又亂摸=1,000)\n\n熟爆30,000＋當日營業額\n生爆40,000＋當日營業額\n生爆熟60,000＋當日營業額\n勞煩派工請勿亂搞`;

    // Sortable 加入延遲判斷，避免手機滑動被誤判
    const el = document.getElementById('member-list');
    Sortable.create(el, {
        animation: 150,
        ghostClass: 'sortable-ghost',
        delay: 200,             
        delayOnTouchOnly: true, 
        onEnd: async function () {
            const searchVal = document.getElementById('search-input').value;
            if(searchVal) return showToast('⚠️ 搜尋模式下無法儲存排序');
            if(currentView !== 'active') return showToast('⚠️ 離職區無法儲存排序');
            const items = el.querySelectorAll('.member-item');
            const updates = {};
            items.forEach((item, index) => {
                const memberId = item.getAttribute('data-id');
                updates[`/${memberId}/sortIndex`] = index;
            });
            await update(rosterRef, updates);
            showToast('✅ 排序已更新');
        }
    });

    onValue(rosterRef, (snapshot) => {
        const data = snapshot.val();
        allMembers = data || {};
        sortedCache = Object.keys(allMembers).map(id => ({
            id, ...allMembers[id]
        })).sort((a, b) => (a.sortIndex || 0) - (b.sortIndex || 0));
        filterList(); 
        document.getElementById('loading-screen').classList.add('hidden');
    });

    window.switchView = (view) => {
        currentView = view;
        document.getElementById('btn-view-active').style.background = view === 'active' ? 'var(--primary)' : '#7f8c8d';
        document.getElementById('btn-view-archived').style.background = view === 'archived' ? 'var(--primary)' : '#7f8c8d';
        selectedIds.clear(); 
        filterList();
    };

    window.filterList = () => {
        const listEl = document.getElementById('member-list');
        const searchVal = document.getElementById('search-input').value.toLowerCase().trim();
        listEl.innerHTML = '';
        sortedCache.forEach((member) => {
            const memberStatus = member.status || 'active';
            if (memberStatus !== currentView) return; 

            if (searchVal && !member.name.toLowerCase().includes(searchVal)) return;

            const li = document.createElement('li');
            li.className = `member-item ${member.id === currentId ? 'active' : ''}`;
            li.setAttribute('data-id', member.id);
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'select-chk';
            checkbox.checked = selectedIds.has(member.id);
            checkbox.onclick = (e) => e.stopPropagation();
            checkbox.onchange = (e) => {
                if (e.target.checked) selectedIds.add(member.id);
                else selectedIds.delete(member.id);
            };
            const nameSpan = document.createElement('span');
            nameSpan.className = 'member-name';
            
            // 新增北新街的小標籤邏輯
            let locBadge = '【民】';
            if (member.location === '莊二街') locBadge = '【莊】';
            if (member.location === '北新街') locBadge = '【北】';
            
            nameSpan.innerHTML = `<small style="color:#aaa">${locBadge}</small> ${member.name || '未命名'}`;
            li.onclick = () => loadMember(member.id);

            const statusBtn = document.createElement('button');
            if (currentView === 'active') {
                statusBtn.className = 'btn-status archive';
                statusBtn.innerText = '移至離職';
                statusBtn.onclick = (e) => { e.stopPropagation(); changeStatus(member.id, 'archived'); };
            } else {
                statusBtn.className = 'btn-status restore';
                statusBtn.innerText = '復職';
                statusBtn.onclick = (e) => { e.stopPropagation(); changeStatus(member.id, 'active'); };
            }

            li.appendChild(checkbox);
            li.appendChild(nameSpan);
            li.appendChild(statusBtn);
            listEl.appendChild(li);
        });
    };

    window.changeStatus = (id, newStatus) => {
        const msg = newStatus === 'archived' ? '確定要將此人員移至離職區封存嗎？' : '確定要讓此人員復職嗎？';
        if (confirm(msg)) {
            update(ref(db, 'roster/' + id), { status: newStatus }).then(() => {
                selectedIds.delete(id);
                if (currentId === id) window.createNewMember();
                showToast(`✅ 狀態已更新`);
            });
        }
    };

    function setupAutoSave() {
        const inputs = document.querySelectorAll('input[type="text"], textarea, select');
        inputs.forEach(input => {
            if(input.id !== 'search-input') {
                input.addEventListener('input', () => {
                    document.getElementById('save-status').innerText = "⏳ 編輯中...";
                    clearTimeout(autoSaveTimer);
                    autoSaveTimer = setTimeout(() => saveData(true), 1000);
                });
            }
        });
    }

    window.toggleSidebar = () => {
        const sb = document.getElementById('sidebar');
        if (window.innerWidth <= 768) {
            isMobileOpen = !isMobileOpen;
            sb.classList.toggle('mobile-open', isMobileOpen);
        } else {
            sb.classList.toggle('collapsed');
        }
    };

    window.closeSidebarOnMobile = () => { if(window.innerWidth <= 768 && isMobileOpen) window.toggleSidebar(); };

    window.saveData = (isAuto = false) => {
        const nameInput = document.getElementById('input-name').value.trim();
        if (!nameInput && isAuto) return; 
        if (!nameInput) return alert('請輸入姓名！');
        const statusEl = document.getElementById('save-status');
        if(isAuto) statusEl.innerText = "💾 自動儲存中...";
        
        const existingStatus = currentId && allMembers[currentId] && allMembers[currentId].status ? allMembers[currentId].status : 'active';

        const data = {
            name: nameInput,
            location: document.getElementById('input-location').value, 
            features: document.getElementById('input-features').value,
            body: document.getElementById('input-body').value,
            core: document.getElementById('input-core-services').value,
            gift: document.getElementById('input-gift').value,
            packages: document.getElementById('input-packages').value,
            extra: document.getElementById('input-extra-services').value,
            status: existingStatus,
            sortIndex: currentId && allMembers[currentId] ? allMembers[currentId].sortIndex : Object.keys(allMembers).length
        };
        if (!currentId) {
            push(rosterRef, data).then((newRef) => {
                currentId = newRef.key;
                if(isAuto) {
                    statusEl.innerText = "✅ 已同步";
                    document.getElementById('editor-title').innerHTML = `正在編輯：${data.name} <span id="save-status" style="font-size:14px; color:#27ae60; font-weight:normal; margin-left:10px;">✅ 已同步</span>`;
                } else {
                    showToast('✅ 已新增！');
                    window.createNewMember();
                }
            });
        } else {
            update(ref(db, 'roster/' + currentId), data).then(() => {
                if(isAuto) {
                    statusEl.innerText = "✅ 已同步";
                    statusEl.style.color = "#27ae60";
                    setTimeout(() => { statusEl.style.color = "#aaa"; }, 2000);
                } else {
                    showToast('✅ 更新成功！');
                }
            });
        }
    };

    window.loadMember = (id) => {
        currentId = id;
        const data = allMembers[id];
        document.getElementById('input-name').value = data.name || '';
        document.getElementById('input-location').value = data.location || '民權路';
        document.getElementById('input-features').value = data.features || '';
        document.getElementById('input-body').value = data.body || DEFAULT_BODY;
        document.getElementById('input-core-services').value = data.core || '';
        document.getElementById('input-gift').value = data.gift || '';
        document.getElementById('input-packages').value = data.packages || DEFAULT_PACKAGES;
        document.getElementById('input-extra-services').value = data.extra || DEFAULT_EXTRA;
        document.getElementById('editor-title').innerHTML = `正在編輯：${data.name} <span id="save-status" style="font-size:14px; color:#aaa; font-weight:normal; margin-left:10px;"></span>`;
        window.closeSidebarOnMobile();
        window.filterList();
    };

    window.createNewMember = () => {
        currentId = null;
        document.getElementById('input-name').value = '';
        document.getElementById('input-location').value = '民權路';
        document.getElementById('input-features').value = '';
        document.getElementById('input-body').value = DEFAULT_BODY;
        document.getElementById('input-core-services').value = '';
        document.getElementById('input-gift').value = ''; 
        document.getElementById('input-packages').value = DEFAULT_PACKAGES;
        document.getElementById('input-extra-services').value = DEFAULT_EXTRA;
        document.getElementById('editor-title').innerHTML = `新增人員資訊 <span id="save-status" style="font-size:14px; color:#aaa; font-weight:normal; margin-left:10px;"></span>`;
        document.getElementById('output-area').value = '';
        window.filterList();
        window.closeSidebarOnMobile();
    };

    window.toggleAll = (shouldSelect) => {
        const items = document.querySelectorAll('.member-item');
        items.forEach(item => {
            const id = item.getAttribute('data-id');
            const chk = item.querySelector('.select-chk');
            chk.checked = shouldSelect;
            if (shouldSelect) selectedIds.add(id); else selectedIds.delete(id);
        });
    };

    window.showToast = (msg) => {
        const x = document.getElementById("toast");
        x.innerText = msg; x.className = "show";
        setTimeout(() => { x.className = ""; }, 2500);
    };

    window.copyOutput = () => {
        const text = document.getElementById('output-area').value;
        if(text) navigator.clipboard.writeText(text).then(() => showToast('✅ 內容已複製'));
    };

    function formatText(data) {
        const extra = data.extra || DEFAULT_EXTRA;
        let output = `${data.name}\n\n`; 
        if(data.features) output += `✨\n${data.features}\n\n`;
        output += `💖\n${data.body}\n\n`;
        if(data.core) output += `👑\n${data.core}\n\n`;
        if(data.gift) output += `🎁\n${data.gift}\n\n`;
        output += `💰\n${data.packages}\n\n`;
        if(extra) output += `✅ 加值服務\n${extra}`;
        return output.trim();
    }

    window.generateOutput = (autoCopy = false) => {
        const name = document.getElementById('input-name').value;
        if (!name) return alert('請先輸入姓名');
        const currentData = {
            name: name,
            features: document.getElementById('input-features').value,
            body: document.getElementById('input-body').value,
            core: document.getElementById('input-core-services').value,
            gift: document.getElementById('input-gift').value,
            packages: document.getElementById('input-packages').value,
            extra: document.getElementById('input-extra-services').value
        };
        let output = formatText(currentData) + `\n\n————————`; 
        document.getElementById('output-area').value = output;
        if (autoCopy) navigator.clipboard.writeText(output).then(() => showToast(`✅ 已複製：${currentData.name}`));
    };

    window.copySelectedMembers = () => {
        if (selectedIds.size === 0) return alert('請先勾選名單！');
        const dateStr = `${new Date().getMonth() + 1}/${new Date().getDate()}`;
        let headerText = `${dateStr}\n@all\n🔥紙房子🔥定點\n\n下單請敲 ➡️➡️紙房子1線-派工下單【東京】\n\n⭐️桃園區\n—————————————\n`;
        
        let listMinquan = [], listZhuang = [], listBeixin = [], fullDetailsText = ""; 
        sortedCache.forEach((member) => {
            if (selectedIds.has(member.id) && (member.status === 'active' || !member.status)) {
                if (member.location === '莊二街') listZhuang.push(member); 
                else if (member.location === '北新街') listBeixin.push(member); 
                else listMinquan.push(member);
            }
        });

        let minquanSection = "";
        if (listMinquan.length > 0) {
            minquanSection = `【 民權路 】\n❌❌❌不接生客\n需成功消費3次以上\n今日 (${listMinquan.length}) 位上班\n\n`;
            listMinquan.forEach(m => { minquanSection += `${m.name}\n\n`; });
        }
        
        let zhuangSection = "";
        if (listZhuang.length > 0) {
            zhuangSection = (listMinquan.length > 0 ? "—————————————\n" : "") + `【 莊二街 】\n❌❌❌不接生客\n需成功消費3次以上\n今日 (${listZhuang.length}) 位上班\n\n`;
            listZhuang.forEach(m => { zhuangSection += `${m.name}\n\n`; });
        }

        let beixinSection = "";
        if (listBeixin.length > 0) {
            beixinSection = ((listMinquan.length > 0 || listZhuang.length > 0) ? "—————————————\n" : "") + `【 北新街 】\n❌❌❌不接生客\n需成功消費3次以上\n今日 (${listBeixin.length}) 位上班\n\n`;
            listBeixin.forEach(m => { beixinSection += `${m.name}\n\n`; });
        }

        listMinquan.concat(listZhuang).concat(listBeixin).forEach(m => { fullDetailsText += formatText(m) + `\n\n————————\n\n`; });
        const finalOutput = headerText + minquanSection + zhuangSection + beixinSection + "=======================\n" + fullDetailsText + (localStorage.getItem('myFooter') || DEFAULT_FOOTER_TEMPLATE);
        document.getElementById('output-area').value = finalOutput.trim();
        navigator.clipboard.writeText(finalOutput).then(() => showToast(`✅ 已複製公告`));
    };

    window.copyShortSchedule = () => {
        if (selectedIds.size === 0) return alert('請先勾選名單！');
        
        const dateStr = `${new Date().getMonth() + 1}/${new Date().getDate()}`;
        let headerText = `${dateStr} ⚠️本日班表更新⚠️\n@All \n=================\n`;
        let footerText = `=================\n煩請各位老闆小幫手協助更新上架\n十分感謝！！祝生意興隆`;
        
        let listMinquan = [], listZhuang = [], listBeixin = [];
        sortedCache.forEach((member) => {
            if (selectedIds.has(member.id) && (member.status === 'active' || !member.status)) {
                if (member.location === '莊二街') listZhuang.push(member); 
                else if (member.location === '北新街') listBeixin.push(member); 
                else listMinquan.push(member);
            }
        });

        let minquanSection = "";
        if (listMinquan.length > 0) {
            minquanSection = `【 民權 】今日 ${listMinquan.length} 位上班\n\n`;
            listMinquan.forEach(m => { minquanSection += `${m.name}\n\n`; });
            minquanSection += `=================\n`;
        }

        let zhuangSection = "";
        if (listZhuang.length > 0) {
            zhuangSection = `【 莊二 】今日 ${listZhuang.length} 位上班\n\n`;
            listZhuang.forEach(m => { zhuangSection += `${m.name}\n\n`; });
            zhuangSection += `=================\n`; 
        }

        let beixinSection = "";
        if (listBeixin.length > 0) {
            beixinSection = `【 北新 】今日 ${listBeixin.length} 位上班\n\n`;
            listBeixin.forEach(m => { beixinSection += `${m.name}\n\n`; });
        }

        const finalOutput = headerText + minquanSection + zhuangSection + beixinSection + footerText;
        document.getElementById('output-area').value = finalOutput.trim();
        navigator.clipboard.writeText(finalOutput).then(() => showToast(`✅ 已複製簡短班表`));
    };

    window.openSettings = () => {
        document.getElementById('settings-modal').classList.add('show');
        document.getElementById('setting-footer').value = localStorage.getItem('myFooter') || DEFAULT_FOOTER_TEMPLATE;
    };
    window.closeSettings = () => document.getElementById('settings-modal').classList.remove('show');
    window.saveSettings = () => {
        localStorage.setItem('myFooter', document.getElementById('setting-footer').value);
        showToast('✅ 設定已儲存'); window.closeSettings();
    };
    window.onload = () => { setupAutoSave(); window.createNewMember(); };
</script>

</body>
</html>
